name: ExpiryApp
options:
  bundleIdPrefix: com.nicolasaugusti
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
packages: {}
targets:
  ExpiryApp:
    type: application
    platform: iOS
    sources:
      - path: ExpiryApp
    resources:
      - path: ExpiryApp/Resources/Assets.xcassets
      - path: ExpiryApp/Resources/en.lproj
      - path: ExpiryApp/Resources/fr.lproj
      - path: ExpiryApp/Resources/products.json
    entitlements:
      path: ExpiryApp/App/ExpiryApp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolasaugusti.expiryapp
        INFOPLIST_FILE: ExpiryApp/App/Info.plist
        DEVELOPMENT_TEAM: 7D7BD9XMS6
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ExpiryApp/App/ExpiryApp.entitlements
        TARGETED_DEVICE_FAMILY: 1
        ENABLE_USER_NOTIFICATIONS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets: []
